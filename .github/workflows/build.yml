name: GLang Windows & MacOS Build
env:
  VERSION: ${{ github.event.release.tag_name || github.ref_name || 'latest' }}

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install GitHub CLI
        uses: cli/cli@v3

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build for x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build for aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Combine into universal binary
        run: |
          mkdir -p dist/payload/usr/local/bin
          lipo -create \
            target/x86_64-apple-darwin/release/glang \
            target/aarch64-apple-darwin/release/glang \
            -output dist/payload/usr/local/bin/glang
          chmod +x dist/payload/usr/local/bin/glang

      - name: Add library files
        run: |
          mkdir -p dist/payload/Library/GeorgeLanguage
          cp -r library dist/payload/Library/GeorgeLanguage/
          cp LICENSE dist/payload/Library/GeorgeLanguage/
          cp README.md dist/payload/Library/GeorgeLanguage/

      - name: Create pkg installer
        run: |
          pkgbuild \
            --root dist/payload \
            --identifier com.george-language.glang \
            --version $VERSION \
            --install-location / \
            dist/GeorgeLanguage-$VERSION-macos_setup.pkg

      - name: Upload pkg artifact
        uses: actions/upload-artifact@v7
        with:
          name: GeorgeLanguage-$VERSION-macos_setup
          path: dist/GeorgeLanguage-$VERSION-macos_setup.pkg

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            dist/GeorgeLanguage-$VERSION-macos_setup.pkg \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install GitHub CLI
        uses: cli/cli@v3

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build for x86_64
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer with Inno Setup
        run: iscc /DMyAppVersion=${{ env.VERSION }} installer.iss

      - name: Rename exe
        run: ren "dist/GeorgeLanguage.exe" "GeorgeLanguage-${{ env.VERSION }}-windows_setup.exe"

      - name: Upload exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: GeorgeLanguage-${{ env.VERSION }}-windows_setup
          path: dist/GeorgeLanguage-${{ env.VERSION }}-windows_setup.exe

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            dist/GeorgeLanguage-${{ env.VERSION }}-windows_setup.exe \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
