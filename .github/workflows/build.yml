name: GLang Windows & MacOS Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag"
        required: true

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set VERSION
        shell: bash
        run: echo "VERSION=${{ github.event.release.tag_name || inputs.version || github.ref_name }}" >> $GITHUB_ENV

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin,aarch64-apple-darwin

      - name: Build for x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build for aarch64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Combine into universal binary
        run: |
          mkdir -p dist/payload/usr/local/bin
          lipo -create \
            target/x86_64-apple-darwin/release/glang \
            target/aarch64-apple-darwin/release/glang \
            -output dist/payload/usr/local/bin/glang
          chmod +x dist/payload/usr/local/bin/glang

      - name: Create pkg installer
        run: |
          pkgbuild \
            --root dist/payload \
            --identifier com.george-language.glang \
            --version ${{ env.VERSION }} \
            --install-location / \
            dist/glang-installer.pkg

      - name: Upload pkg artifact
        uses: actions/upload-artifact@v7
        with:
          name: glang-installer
          path: dist/glang-installer.pkg

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            dist/glang-installer.pkg \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set VERSION
        shell: bash
        run: echo "VERSION=${{ github.event.release.tag_name || inputs.version || github.ref_name }}" >> $GITHUB_ENV

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build for x86_64
        run: cargo build --release --target x86_64-pc-windows-msvc

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer with Inno Setup
        run: iscc /DMyAppVersion=${{ env.VERSION }} installer.iss

      - name: Rename exe
        run: ren "dist/GeorgeLanguage.exe" "glang-installer.exe"

      - name: Upload exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: glang-installer
          path: dist/glang-installer.exe

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        run: |
          gh release upload ${{ github.event.release.tag_name }} \
            dist/glang-installer.exe \
            --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
